name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: stable
    - uses: actions/upload-artifact@v4
      with:
        name: APK-STICKMAN
        path: bin/*.apk
